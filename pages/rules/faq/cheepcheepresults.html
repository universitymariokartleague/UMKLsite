<!DOCTYPE html>
<html lang="en">

<head>
    <base href="../../../">

    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark light">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover.0">
    <title>Discord Embed</title>
    <link rel="stylesheet" href="css/cheepcheepsignup.css">
</head>

<body>
    <div class="message theme-darkest">
        <img src="assets/media/faq/cheepcheep.avif" class="avatar" alt="Cheep Cheep Avatar">
        <div translate="no" class="message-content">
            <div>
                <span class="username">Cheep Cheep</span>
                <span class="apptag">APP</span>
                <span class="timestamp">14:32</span>
            </div>

            <div class="embed-container">
                <div class="embed-author">
                    <img src="assets/media/faq/tournaments.avif" class="embed-author-icon" alt="Author Icon">
                    <span>Matches</span>
                </div>

                <div class="embed-title">
                    <a href="https://umkl.co.uk/pages/matches/" target="_blank">York VS Staffs - Results</a>
                </div>

                <div class="embed-description">
                    <p>
                        These are the results for <b>York VS Staffs</b>, you can see the updated standings in
                        <span class="discord-timestamp">#standings</span>!
                    </p>
                </div>

                <div class="embed-image">
                    <img src="assets/media/faq/york_vs_staffs_results.avif"
                        alt="An example results graphic showing race-by-race scores for York VS Staffs">
                </div>

                <div class="embed-footer">
                    Click the match name to open the UMKL website and see stats about the match
                </div>
            </div>
        </div>
    </div>
</body>

</html>
